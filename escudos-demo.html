<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudos — demonstração</title>
<style>
  body{background:#0E0F13;color:#F4F6F8;font-family:system-ui,sans-serif;margin:0;padding:24px}
  h1{font-size:20px}
  h2{font-size:14px;color:#2BD46A;margin-top:32px;letter-spacing:2px}
  .cont{color:#99A0AA;font-size:12px;font-weight:400;letter-spacing:0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px;margin-top:12px}
  .card{background:#16181F;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;text-align:center}
  .big{width:80px;height:80px;margin:0 auto}
  .nm{font-size:12px;margin-top:6px}.sm{width:24px;height:24px;margin:8px auto 0}
</style></head><body>
<h1>Escudos genéricos &amp; bandeiras — demonstração</h1>
<p style="color:#99A0AA;font-size:13px">Nenhum escudo real é usado. Clubes = cor + padrão; seleções = bandeira (domínio público).</p>

<!-- Uma seção por competição + as seleções. As seções são geradas pelo JS. -->
<div id="secoes"></div>

<script src="js/escudos.js"></script>
<script src="js/escudos-cores.js"></script>
<script>
  var raiz = document.getElementById('secoes');

  function card(nome, svg) {
    var d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = '<div class="big">' + svg + '</div>' +
                  '<div class="nm">' + nome + '</div>' +
                  '<div class="sm">' + svg + '</div>';
    return d;
  }

  function secao(titulo, nomes, fabricaSvg) {
    var h = document.createElement('h2');
    h.innerHTML = titulo + ' <span class="cont">(' + nomes.length + ')</span>';
    raiz.appendChild(h);
    var g = document.createElement('div');
    g.className = 'grid';
    nomes.forEach(function (nome) { g.appendChild(card(nome, fabricaSvg(nome))); });
    raiz.appendChild(g);
  }

  // CLUBES — uma seção por competição (Brasileirão, Libertadores, …).
  // Usa a API única porNome(): mesma coisa que o jogo desenha.
  var porComp = EscudosCores.clubesPorCompeticao();
  Object.keys(porComp).forEach(function (comp) {
    secao('CLUBES · ' + comp.toUpperCase(), porComp[comp].sort(), function (nome) {
      return Escudos.porNome(nome);
    });
  });

  // SELEÇÕES
  secao('SELEÇÕES', EscudosCores.todasSelecoes().sort(), function (nome) {
    return Escudos.porNome(nome);
  });
</script></body></html>
