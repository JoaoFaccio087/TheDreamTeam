server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API REST — ^~ impede que a regex de assets sobreponha este bloco
    location ^~ /api/ {
        proxy_pass         http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Socket.IO — WebSocket upgrade + ^~ para não ser capturado pela regex .js
    location ^~ /socket.io/ {
        proxy_pass         http://api:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Assets estáticos com cache
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
