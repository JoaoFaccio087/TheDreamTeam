<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Dream Team">
  <!-- Brasão do The Dream Team: anel dourado + monograma DT + linha do campo.
       Poucos elementos e traços grossos de propósito: favicon precisa ler a 16px.
       As letras são PATHS (não <text>), então não dependem de fonte instalada. -->
  <defs>
    <linearGradient id="ouro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EBCC7E"/>
      <stop offset="1" stop-color="#C9A24C"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado: garante contraste em abas claras e escuras -->
  <rect width="64" height="64" rx="14" fill="#0E0F13"/>

  <!-- Anel dourado único e grosso -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="url(#ouro)" stroke-width="4"/>

  <!-- Monograma DT, centralizado e ampliado (bbox original 15.6..45.9 x 17.8..36.2) -->
  <g fill="url(#ouro)" transform="translate(32 30) scale(1.3) translate(-30.75 -27)">
    <path d="M15.6 17.8h8.4c6.1 0 9.9 3.7 9.9 9.2s-3.8 9.2-9.9 9.2h-8.4V17.8zm8.1 14.1c3.4 0 5.5-1.9 5.5-4.9s-2.1-4.9-5.5-4.9h-3.4v9.8h3.4z"/>
    <path d="M35.6 22.1h-5.6v-4.3h15.9v4.3h-5.6v14.1h-4.7V22.1z"/>
  </g>

  <!-- Linha do campo: único acento verde, grosso o bastante para sobreviver ao 16px -->
  <line x1="22" y1="45" x2="42" y2="45" stroke="#2BD46A" stroke-width="2.6" stroke-linecap="round"/>
</svg>
